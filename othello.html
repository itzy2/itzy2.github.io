<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オセロ</title>

<style>
body {
  background:#0f0f1a;
  color:white;
  text-align:center;
  font-family:Arial;
}

.board {
  display:grid;
  grid-template-columns:repeat(8,50px);
  gap:3px;
  justify-content:center;
}

.cell {
  width:50px;
  height:50px;
  background:green;
  cursor:pointer;
}

.black,.white {
  width:40px;
  height:40px;
  border-radius:50%;
  margin:auto;
}

.black{background:black;}
.white{background:white;}

.screen { display:none; }
.active { display:block; }

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#6c63ff;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start" class="screen active">
  <h1>オセロ</h1>
  <p>レベルを選択</p>

  <div id="levelButtons"></div>
  <p id="selected">選択: 10</p>

  <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="game" class="screen">
  <h1>オセロ</h1>
  <p id="status"></p>
  <div class="board" id="board"></div>
  <br>
  <button onclick="location.reload()">もう一度</button>
</div>

<script>
let board, turn=1, level=10;
const dirs = [-1,1,-8,8,-9,-7,7,9];

// レベルボタン生成
const container = document.getElementById("levelButtons");

for(let i=1;i<=10;i++){
  const btn = document.createElement("button");
  btn.innerText = i;

  btn.onclick = () => {
    level = i;
    document.getElementById("selected").innerText = "選択: " + i;

    document.querySelectorAll("#levelButtons button").forEach(b=>{
      b.style.background="#6c63ff";
    });

    btn.style.background="red";
  };

  container.appendChild(btn);
}

// スタート
function startGame(){
  document.getElementById("start").classList.remove("active");
  document.getElementById("game").classList.add("active");
  init();
}

// 初期化
function init(){
  board = Array(64).fill(0);
  board[27]=2; board[28]=1;
  board[35]=1; board[36]=2;
  draw();
}

// 描画
function draw(){
  const b=document.getElementById("board");
  b.innerHTML="";
  board.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.onclick=()=>playerMove(i);

    if(c===1){
      let p=document.createElement("div");
      p.className="black";
      d.appendChild(p);
    }
    if(c===2){
      let p=document.createElement("div");
      p.className="white";
      d.appendChild(p);
    }

    b.appendChild(d);
  });
}

// 有効判定
function validMove(i,p){
  if(board[i]!==0) return false;

  for(let d of dirs){
    let j=i+d, found=false;

    while(j>=0 && j<64){
      if(board[j]===3-p){
        found=true;
      } else if(board[j]===p && found){
        return true;
      } else {
        break;
      }
      j+=d;
    }
  }
  return false;
}

// ひっくり返す
function flip(i,p){
  for(let d of dirs){
    let j=i+d, list=[];

    while(j>=0 && j<64){
      if(board[j]===3-p){
        list.push(j);
      } else if(board[j]===p){
        list.forEach(x=>board[x]=p);
        break;
      } else {
        break;
      }
      j+=d;
    }
  }
}

// プレイヤー
function playerMove(i){
  if(!validMove(i,1)) return;

  board[i]=1;
  flip(i,1);
  draw();

  setTimeout(cpuMove,300);
}

// CPU
function cpuMove(){
  let moves=[];

  board.forEach((v,i)=>{
    if(validMove(i,2)) moves.push(i);
  });

  if(moves.length===0) return;

  let move;

  if(level <= 4){
    move = moves[Math.floor(Math.random()*moves.length)];
  } else {
    move = moves.sort((a,b)=>score(b)-score(a))[0];
  }

  board[move]=2;
  flip(move,2);
  draw();

  checkEnd();
}

// 評価
function score(i){
  let x=i%8;
  let y=Math.floor(i/8);
  let val=0;

  if((x===0||x===7)&&(y===0||y===7)) val+=100;
  if(x===0||x===7||y===0||y===7) val+=10;

  return val;
}

// 終了判定
function checkEnd(){
  if(!board.includes(0)){
    let b=board.filter(x=>x===1).length;
    let w=board.filter(x=>x===2).length;

    document.getElementById("status").innerText =
      "終了 黒:"+b+" 白:"+w;
  }
}
</script>

</body>
</html>
