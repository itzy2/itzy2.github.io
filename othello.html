<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オセロ</title>

<style>
body { background:#0f0f1a; color:white; text-align:center; font-family:Arial; }
.board {
  display:grid;
  grid-template-columns:repeat(8,50px);
  gap:3px;
  justify-content:center;
}
.cell { width:50px; height:50px; background:green; cursor:pointer; }
.black,.white {
  width:40px; height:40px; border-radius:50%; margin:auto;
}
.black{background:black;} .white{background:white;}
</style>
</head>
<body>

<h1>オセロ（本物）</h1>

レベル:
<select id="level">
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
  <option selected>10</option>
</select>

<p id="status"></p>

<div class="board" id="board"></div>

<script>
let board = Array(64).fill(0);
board[27]=2; board[28]=1; board[35]=1; board[36]=2;

let turn = 1; //1黒（プレイヤー）2白（CPU）

const dirs = [-1,1,-8,8,-9,-7,7,9];

function draw(){
  const b=document.getElementById("board");
  b.innerHTML="";
  board.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="cell";
    d.onclick=()=>playerMove(i);
    if(c===1){let p=document.createElement("div");p.className="black";d.appendChild(p);}
    if(c===2){let p=document.createElement("div");p.className="white";d.appendChild(p);}
    b.appendChild(d);
  });
}

function validMove(i,player){
  if(board[i]!==0) return false;
  for(let d of dirs){
    let j=i+d, found=false;
    while(j>=0 && j<64){
      if(board[j]===3-player){found=true;}
      else if(board[j]===player && found){return true;}
      else break;
      j+=d;
    }
  }
  return false;
}

function flip(i,player){
  for(let d of dirs){
    let j=i+d, list=[];
    while(j>=0 && j<64){
      if(board[j]===3-player){list.push(j);}
      else if(board[j]===player){
        list.forEach(x=>board[x]=player);
        break;
      } else break;
      j+=d;
    }
  }
}

function playerMove(i){
  if(!validMove(i,1)) return;
  board[i]=1;
  flip(i,1);
  draw();
  setTimeout(cpuMove,300);
}

function cpuMove(){
  let level = Number(document.getElementById("level").value);
  let moves = [];

  board.forEach((v,i)=>{
    if(validMove(i,2)) moves.push(i);
  });

  if(moves.length===0) return;

  let move;

  if(level <= 4){
    move = moves[Math.floor(Math.random()*moves.length)];
  } else {
    move = moves.sort((a,b)=>score(b)-score(a))[0];
  }

  board[move]=2;
  flip(move,2);
  draw();
  checkEnd();
}

function score(i){
  let x=i%8, y=Math.floor(i/8);
  let val=0;
  if((x===0||x===7)&&(y===0||y===7)) val+=100; //角
  if(x===0||x===7||y===0||y===7) val+=10; //端
  return val;
}

function checkEnd(){
  if(!board.includes(0)){
    let black = board.filter(x=>x===1).length;
    let white = board.filter(x=>x===2).length;
    document.getElementById("status").innerText =
      "終了 黒:"+black+" 白:"+white;
  }
}

draw();
</script>

</body>
</html>
