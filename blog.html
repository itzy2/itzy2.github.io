<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブログ</title>

<style>
body {
  background:#0f0f1a;
  color:white;
  font-family:Arial;
  margin:0;
}

/* タイトル */
h1 {
  text-align:center;
  margin:20px;
}

/* グリッド */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

/* カード */
.card {
  background:#1f1f3a;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

/* 画像 */
.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

/* 中身 */
.content {
  padding:15px;
}

.content h2 {
  margin:0;
  font-size:18px;
}

.content p {
  font-size:14px;
  color:#ccc;
}

/* ボタン */
.btn {
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:#6c63ff;
  color:white;
  border-radius:10px;
  text-decoration:none;
}
</style>

</head>
<body>

<h1>ブログ</h1>

<div class="container">

  <div class="card">
    <img src="https://picsum.photos/400/200?1">
    <div class="content">
      <h2>サイト公開しました</h2>
      <p>最初の記事です</p>
      <a href="post1.html" class="btn">読む</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?2">
    <div class="content">
      <h2>オセロ追加</h2>
      <p>ゲームを追加しました</p>
      <a href="post2.html" class="btn">読む</a>
    </div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/400/200?3">
    <div class="content">
      <h2>テトリス完成</h2>
      <p>スコア機能つき</p>
      <a href="post3.html" class="btn">読む</a>
    </div>
  </div>

</div>

</body>
</html>
