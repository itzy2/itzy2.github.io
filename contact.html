<div style="
  max-width:900px;
  margin:30px auto;
  text-align:center;
">

  <!-- メール -->
  <div style="
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:30px;
  ">
    <div onclick="copyMail()" style="
      background:linear-gradient(90deg,#7b5cff,#00d4ff);
      padding:12px 20px;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    ">
      📧 itzy.customer@gmail.com
    </div>

    <button onclick="copyMail()" style="
      padding:10px 15px;
      border-radius:10px;
      border:none;
      background:#2a2a3f;
      color:white;
      cursor:pointer;
    ">
      アドレスをコピー
    </button>
  </div>

  <!-- 説明カード -->
  <div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
  ">

    <div style="
      background:#1e1e2f;
      padding:20px;
      border-radius:15px;
      color:white;
    ">
      <h3>対応について</h3>
      <p>
        本サイトは個人で開発・運営しているため、<br>
        ご対応までにお時間をいただく場合があります。
      </p>
    </div>

    <div style="
      background:#1e1e2f;
      padding:20px;
      border-radius:15px;
      color:white;
    ">
      <h3>お問い合わせについて</h3>
      <p>
        不具合の報告や気になる点など、<br>
        お気軽にご連絡いただけると助かります。
      </p>
    </div>

  </div>

</div>

<script>
function copyMail(){
  navigator.clipboard.writeText("itzy.customer@gmail.com");
  alert("メールアドレスをコピーしました");
}
</script>
