<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お問い合わせ</title>

<style>
body {
  background: #0f0f1a;
  color: white;
  text-align: center;
  font-family: Arial;
}

input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  border: none;
}
</style>

</head>
<body>

<h1>お問い合わせ</h1>

<!-- 入力欄 -->
<input type="text" id="name" placeholder="ニックネーム"><br>
<input type="email" id="email" placeholder="メール"><br>
<textarea id="msg" placeholder="内容"></textarea><br>

<!-- 送信ボタン -->
<button onclick="sendMail()">送信</button>

<p id="info"></p>

<script>
function sendMail() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const msg = document.getElementById("msg").value;

  // メールアプリを開く
  location.href =
    "mailto:itzy.Custom@gmail.com?subject=お問い合わせ&body=" +
    "名前: " + name + "%0D%0A" +
    "メール: " + email + "%0D%0A" +
    "内容: " + msg;
}
</script>

<br>
<a href="index.html">戻る</a>

</body>
</html>
