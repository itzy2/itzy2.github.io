<body style="margin:0; background:#0f0f1a; color:white; font-family:sans-serif;">

<div style="
  max-width:600px;
  margin:40px auto;
  text-align:center;
">

  <!-- メール -->
  <div style="margin-bottom:30px;">
    <div onclick="copyMail()" style="
      background:linear-gradient(90deg,#7b5cff,#00d4ff);
      padding:15px;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
    ">
      📧 itzy.customer@gmail.com
    </div>

    <button onclick="copyMail()" style="
      margin-top:10px;
      padding:10px;
      border-radius:10px;
      border:none;
      background:#2a2a3f;
      color:white;
      cursor:pointer;
    ">
      アドレスをコピー
    </button>
  </div>

  <!-- 縦並びカード -->
  <div style="display:flex; flex-direction:column; gap:20px;">

    <div style="
      background:#1e1e2f;
      padding:20px;
      border-radius:15px;
    ">
      <h3>対応について</h3>
      <p>
        本サイトは個人で開発しているため、<br>
        ご対応までにお時間をいただく場合があります。
      </p>
    </div>

    <div style="
      background:#1e1e2f;
      padding:20px;
      border-radius:15px;
    ">
      <h3>お問い合わせについて</h3>
      <p>
        不具合や気になる点があれば、<br>
        お気軽にご連絡いただけると助かります。
      </p>
    </div>

  </div>

</div>

<script>
function copyMail(){
  navigator.clipboard.writeText("itzy.customer@gmail.com");
  alert("コピーしました！");
}
</script>

</body>
