<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  background: black;
  border: 3px solid #555;
}
</style>
</head>

<body>

<canvas id="game" width="240" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
let piece = {x:4, y:0};

const colors = ["cyan","blue","orange","yellow","green","purple","red"];
let color = colors[Math.floor(Math.random()*colors.length)];

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = color;
  ctx.fillRect(piece.x*grid, piece.y*grid, grid, grid);
}

function drop(){
  piece.y++;
  draw();
}

function rotate(){
  piece.x = (piece.x + 1) % 10;
  draw();
}

// 自動落下
setInterval(drop, 800);

// Enterで落下
document.addEventListener("keydown", e=>{
  if(e.key === "Enter") drop();
});

// クリックで落下
document.addEventListener("click", drop);

// ダブルタップで回転
let lastTap = 0;
document.addEventListener("touchstart", ()=>{
  let now = Date.now();
  if(now - lastTap < 300){
    rotate();
  }
  lastTap = now;
});

draw();
</script>

</body>
</html>
