<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>V2.0 テトリス</title>

<style>
body { background:#0f0f1a; color:white; text-align:center; }
canvas { background:black; margin-top:10px; }
</style>
</head>
<body>

<h1>テトリス</h1>
<p>スコア: <span id="score">0</span></p>

<canvas id="game" width="200" height="400"></canvas>

<script>
const COL = 10;
const ROW = 20;
const SIZE = 20;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let board = Array.from({length:ROW},()=>Array(COL).fill(0));
let score = 0;
let dropSpeed = 500;

const pieces = [
[[1,1,1,1]], // I
[[1,1],[1,1]], // O
[[0,1,0],[1,1,1]], // T
[[1,0,0],[1,1,1]], // J
[[0,0,1],[1,1,1]], // L
[[1,1,0],[0,1,1]], // S
[[0,1,1],[1,1,0]]  // Z
];

let piece;

function newPiece(){
  piece = {
    shape: pieces[Math.floor(Math.random()*pieces.length)],
    x: 3,
    y: 0
  };
}

function draw(){
  ctx.clearRect(0,0,200,400);

  for(let y=0;y<ROW;y++){
    for(let x=0;x<COL;x++){
      if(board[y][x]){
        ctx.fillStyle="cyan";
        ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      }
    }
  }

  piece.shape.forEach((row,dy)=>{
    row.forEach((v,dx)=>{
      if(v){
        ctx.fillRect((piece.x+dx)*SIZE,(piece.y+dy)*SIZE,SIZE,SIZE);
      }
    });
  });
}

function collide(){
  return piece.shape.some((row,dy)=>
    row.some((v,dx)=>{
      let x = piece.x+dx;
      let y = piece.y+dy;
      return v && (x<0 || x>=COL || y>=ROW || board[y]?.[x]);
    })
  );
}

function merge(){
  piece.shape.forEach((row,dy)=>{
    row.forEach((v,dx)=>{
      if(v){
        board[piece.y+dy][piece.x+dx]=1;
      }
    });
  });
}

function clearLines(){
  let lines = 0;

  for(let y=ROW-1;y>=0;y--){
    if(board[y].every(v=>v)){
      board.splice(y,1);
      board.unshift(Array(COL).fill(0));
      lines++;
    }
  }

  if(lines>0){
    score += lines * 100;
    document.getElementById("score").innerText = score;

    dropSpeed = Math.max(100, dropSpeed - 20);
  }
}

function rotate(){
  const newShape = piece.shape[0].map((_,i)=>
    piece.shape.map(r=>r[i]).reverse()
  );

  const old = piece.shape;
  piece.shape = newShape;

  if(collide()) piece.shape = old;
}

function update(){
  piece.y++;

  if(collide()){
    piece.y--;
    merge();
    clearLines();
    newPiece();

    if(collide()){
      alert("ゲームオーバー");
      location.reload();
    }
  }

  draw();
}

function loop(){
  update();
  setTimeout(loop, dropSpeed);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") piece.x--;
  if(e.key==="ArrowRight") piece.x++;
  if(e.key==="ArrowDown") piece.y++;
  if(e.key==="ArrowUp") rotate();

  if(collide()){
    if(e.key==="ArrowLeft") piece.x++;
    if(e.key==="ArrowRight") piece.x--;
    if(e.key==="ArrowDown") piece.y--;
  }

  draw();
});

newPiece();
loop();
</script>

</body>
</html>
