<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

/* タイトル */
h1 {
  text-align: center;
  margin: 20px;
}

/* カード全体 */
.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

/* カード */
.card {
  background: #1f1f3a;
  padding: 20px;
  width: 200px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}

/* ホバー */
.card:hover {
  transform: scale(1.05);
}

/* ボタン */
button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>My Dashboard</h1>

<div class="container">

  <div class="card">
    <h2>Main Page</h2>
    <p>トップページへ</p>
    <button onclick="location.href='#'">開く</button>
  </div>

  <div class="card">
    <h2>Uptime</h2>
    <p>サーバー状態</p>
    <button>確認</button>
  </div>

  <div class="card">
    <h2>Tools</h2>
    <p>便利ツール</p>
    <button>開く</button>
  </div>

</div>

</body>
</html>
