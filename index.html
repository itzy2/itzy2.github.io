<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マイダッシュボード</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

h1 {
  text-align: center;
  margin: 20px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #1f1f3a;
  padding: 20px;
  width: 200px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>itzy2 Select　Board</h1>

<div class="container">

  <div class="card">
    <h2>Main Page</h2>
    <p>トップページ</p>
    <button onclick="location.href='index.html'">開く</button>
  </div>

  <div class="card">
    <h2>Uptime</h2>
    <p>サーバー状態</p>
    <button onclick="location.href='status.html'">開く</button>
  </div>

  <div class="card">
    <h2>blog</h2>
    <p>ブログ</p>
    <button onclick="location.href='blog.html'">開く</button>
  </div>

  <div class="card">
  　<h2>Projects</h2>
    <p>作品</p>
    <button onclick="location.href='projects.html'">開く</button>
  </div>

  <div class="card">
    <h2>members page</h2>
    <p>会員用ページ<p>
  　<button onclick="location.href='login.html'">ログイン</button>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>連絡</p>
    <button onclick="location.href='contact.html'">開く</button>
  </div>

</div>

</body>
</html>
