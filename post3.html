  <p class="date">2026/04/01</p>
今日はフルーチェを食べた。牛乳と混ぜるだけで簡単にできるのに、デザート感がしっかりあってやっぱりおいしい。<br><br>
  冷たくてなめらかな食感がちょうどよくて、ちょっとしたリフレッシュになった。<br><br>

【豆知識】<br><br>
フルーチェは、牛乳と混ぜることで固まるデザートだけど、これは「ペクチン」という成分の働きによるもの。<br><br>
  牛乳に含まれるカルシウムと反応して、あのトロッとした食感になるらしい。実はゼラチンを使っていないのに固まるのが特徴。<br><br>

こういう仕組みを知ると、いつも食べているものもちょっと面白く感じる。<br><br>
