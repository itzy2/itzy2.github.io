<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:#0f0f1a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.box{
  background:#1e1e2f;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:800px;
}

#calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day{
  background:#2a2a3f;
  padding:10px;
  border-radius:10px;
  min-height:80px;
  cursor:pointer;
  font-size:12px;
}

.header{
  display:flex;
  justify-content:center;
  gap:20px;
  align-items:center;
}
</style>
</head>

<body>

<h1>ログイン</h1>

<div id="loginBox">
  <input id="user" placeholder="ユーザー名"><br>
  <input id="pass" type="password" placeholder="パスワード"><br>
  <button onclick="login()">ログイン</button>
</div>

<div id="main" style="display:none;">

  <h2 id="welcome"></h2>

  <div class="box">

    <div class="header">
      <button onclick="prev()">←</button>
      <h2 id="title"></h2>
      <button onclick="next()">→</button>
    </div>

    <div id="calendar"></div>

  </div>

</div>

<script>
// ユーザー
const users = [
  {user:"tajima", pass:"gifu3300"},
  {user:"itazu", pass:"5024"}
];

// ログイン
function login(){
  const u = user.value;
  const p = pass.value;

  const found = users.find(a=>a.user===u && a.pass===p);

  if(found){
    localStorage.setItem("username", u);
    loginBox.style.display="none";
    main.style.display="block";
    start();
  }else{
    alert("違う");
  }
}

// 開始
function start(){
  const name = localStorage.getItem("username");
  welcome.textContent = "ようこそ " + name + " さん";
  draw();
}

// カレンダー
let date = new Date();

function draw(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const y = date.getFullYear();
  const m = date.getMonth();

  title.textContent = y + "年 " + (m+1) + "月";

  const first = new Date(y,m,1).getDay();
  const last = new Date(y,m+1,0).getDate();

  const key = "cal_"+localStorage.getItem("username")+"_"+y+"_"+m;
  const data = JSON.parse(localStorage.getItem(key)||"{}");

  for(let i=0;i<first;i++){
    cal.innerHTML += "<div></div>";
  }

  for(let i=1;i<=last;i++){
    const d = document.createElement("div");
    d.className="day";
    d.innerHTML = i + "<br>" + (data[i]||"");

    d.onclick = ()=>{
      const text = prompt("予定入力", data[i]||"");
      if(text!==null){
        data[i]=text;
        localStorage.setItem(key, JSON.stringify(data));
        draw();
      }
    };

    cal.appendChild(d);
  }
}

// 月移動
function prev(){
  date.setMonth(date.getMonth()-1);
  draw();
}
function next(){
  date.setMonth(date.getMonth()+1);
  draw();
}
</script>

</body>
</html>
