<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>
<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
  padding-top:50px;
}
input{
  padding:10px;
  margin:10px;
  width:200px;
}
button{
  padding:10px 20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ログイン</h1>

<input id="user" placeholder="ユーザー名"><br>
<input id="pass" type="password" placeholder="パスワード"><br>

<button onclick="login()">ログイン</button>

<script>
// 👇 ユーザー一覧
const users = [
  {user:"tajima", pass:"gifu3300"},
  {user:"itazu", pass:"5024"},
  {user:"user", pass:"3331"}
];

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const found = users.find(acc => acc.user === u && acc.pass === p);

  if(found){
    localStorage.setItem("username", found.user);
    location.href = "project.html";
  } else {
    alert("ユーザー名かパスワードが違う");
  }
}
</script>

</body>
</html>
