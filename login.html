<!DOCTYPE html>
<html>
<body style="background:#0f0f1a;color:white;text-align:center;">

<h1>Speacil Video ログイン</h1>

<input id="email" placeholder="メール"><br><br>
<input id="password" type="password" placeholder="パスワード"><br><br>

<button onclick="login()">ログイン</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ここ",
  authDomain: "ここ",
  projectId: "ここ",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> location.href="video.html")
    .catch(()=> alert("ログイン失敗"));
}
</script>

</body>
</html>
