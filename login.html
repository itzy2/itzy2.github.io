<!DOCTYPE html>
<html>
<body style="background:#0f0f1a;color:white;text-align:center;">

<h1>ログイン</h1>

<input id="pass" type="password" placeholder="パスワード"><br><br>
<button onclick="login()">ログイン</button>

<script>
function login(){
  if(pass.value === "1234"){
    localStorage.setItem("login","ok");
    location.href="video.html";
  } else {
    alert("違います");
  }
}
</script>

</body>
</html>
