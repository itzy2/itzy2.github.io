<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン</title>

<style>
body {
  background: #0f0f1a;
  color: white;
  text-align: center;
  font-family: Arial;
}

.box {
  margin-top: 100px;
}
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
button {
  padding: 10px;
  border-radius: 10px;
  background: #6c63ff;
  color: white;
  border: none;
}
</style>

</head>
<body>

<div class="box">
  <h1>ログイン</h1>

  <input type="password" id="pass" placeholder="パスワード">
  <br><br>

  <button onclick="login()">ログイン</button>

  <p id="msg"></p>
</div>

<script>
function login() {
  const password = document.getElementById("pass").value;

  if(password === "1234") {
    location.href = "member.html";
  } else {
    document.getElementById("msg").innerText = "パスワードが違います";
  }
}
</script>

</body>
</html>
