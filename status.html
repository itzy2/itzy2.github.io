<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>サーバー状態</title>

<style>
body {
  background: #0f0f1a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.box {
  background: #1f1f3a;
  padding: 20px;
  width: 220px;
  border-radius: 15px;
}

.online { color: #00ff88; }
.warning { color: orange; }
.offline { color: red; }
</style>

</head>
<body>

<h1>サーバー状態</h1>

<div class="container">

  <div class="box">
    <h2>Web Server</h2>
    <p class="online">● 稼働中</p>
    <p>応答時間: 120ms</p>
  </div>

  <div class="box">
    <h2>Database</h2>
    <p class="online">● 稼働中</p>
    <p>接続数: 12</p>
  </div>

  <div class="box">
    <h2>API</h2>
    <p class="warning">● 遅延中</p>
    <p>遅延: 350ms</p>
  </div>

  <div class="box">
    <h2>Storage</h2>
    <p class="online">● 正常</p>
    <p>使用率: 68%</p>
  </div>

  <div class="box">
    <h2>Network</h2>
    <p class="online">● 安定</p>
    <p>速度: 95Mbps</p>
  </div>

  <div class="box">
    <h2>Backup</h2>
    <p class="offline">● 停止中</p>
    <p>最終実行: 3日前</p>
  </div>

</div>

<br>
<a href="index.html">戻る</a>

</body>
</html>
