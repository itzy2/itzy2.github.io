<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Speacil Video</h2>
  <input id="search" placeholder="検索">
  <button onclick="logout()">ログアウト</button>
</header>

<div class="player">
  <iframe id="player"></iframe>
</div>

<div id="list" class="grid"></div>
<h3>⭐ お気に入り</h3>
<div id="fav" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ここ",
  authDomain: "ここ",
  projectId: "ここ",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const videos = [
  {id:"dQw4w9WgXcQ", title:"動画①"},
  {id:"3JZ_D3ELwOQ", title:"動画②"},
  {id:"9bZkp7q19f0", title:"動画③"}
];

const list = document.getElementById("list");
const favBox = document.getElementById("fav");
const player = document.getElementById("player");
const search = document.getElementById("search");

let userId;

// ログインチェック
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="login.html";
  } else {
    userId = user.uid;
    loadFav();
  }
});

// 表示
function render(data){
  list.innerHTML="";
  data.forEach(v=>{
    const div = document.createElement("div");
    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${v.id}/0.jpg">
      <p>${v.title}</p>
      <button onclick="event.stopPropagation();addFav('${v.id}')">⭐</button>
    `;
    div.onclick = ()=> player.src=`https://youtube.com/embed/${v.id}`;
    list.appendChild(div);
  });
}

// お気に入り保存
async function addFav(id){
  await setDoc(doc(db,"users",userId),{
    fav: id
  });
  loadFav();
}

// 読み込み
async function loadFav(){
  const docSnap = await getDoc(doc(db,"users",userId));
  if(docSnap.exists()){
    favBox.innerHTML = `<p>${docSnap.data().fav}</p>`;
  }
}

// 検索
search.addEventListener("input", ()=>{
  const k = search.value.toLowerCase();
  render(videos.filter(v=>v.title.toLowerCase().includes(k)));
});

// ログアウト
window.logout = ()=> signOut(auth);

render(videos);
</script>

</body>
</html>
